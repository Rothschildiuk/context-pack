name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run test suite
        run: cargo test --locked

  build:
    name: Build ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux
            targets: x86_64-unknown-linux-gnu
          - runner: macos-14
            label: darwin
            targets: aarch64-apple-darwin,x86_64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail

          IFS=',' read -r -a targets <<< "${{ matrix.targets }}"
          for target in "${targets[@]}"; do
            cargo build --release --locked --target "$target"
          done

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          IFS=',' read -r -a targets <<< "${{ matrix.targets }}"

          for target in "${targets[@]}"; do
            asset_name="context-pack-${tag}-${target}.tar.gz"
            stage_dir="dist/${target}"

            mkdir -p "$stage_dir"
            cp "target/${target}/release/context-pack" "$stage_dir/"
            cp README.md LICENSE "$stage_dir/"
            tar -C "$stage_dir" -czf "dist/${asset_name}" context-pack README.md LICENSE

            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "dist/${asset_name}" > "dist/${asset_name}.sha256"
            else
              shasum -a 256 "dist/${asset_name}" > "dist/${asset_name}.sha256"
            fi
          done

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release bundle
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          find dist -type f -name "*.sha256" -print0 | sort -z | xargs -0 cat > dist/SHA256SUMS
          bash scripts/render-homebrew-formula.sh "${GITHUB_REPOSITORY}" "${version}" "dist" "dist/context-pack.rb"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/SHA256SUMS
            dist/context-pack.rb
          fail_on_unmatched_files: true

  publish-npm:
    name: Publish npm package
    needs: publish
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm package version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cd npm
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${version}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-homebrew-formula:
    name: Update Homebrew formula
    needs: publish
    runs-on: ubuntu-24.04

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          mkdir -p Formula
          bash scripts/render-homebrew-formula.sh "${GITHUB_REPOSITORY}" "${version}" "dist" "Formula/context-pack.rb"

      - name: Commit formula update
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/context-pack.rb

          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi

          git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME#v}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
