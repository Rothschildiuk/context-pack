name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run test suite
        run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          asset_name="context-pack-${tag}-${{ matrix.target }}.tar.gz"
          stage_dir="dist/${{ matrix.target }}"

          mkdir -p "$stage_dir"
          cp "target/${{ matrix.target }}/release/context-pack" "$stage_dir/"
          cp README.md LICENSE "$stage_dir/"
          tar -C "$stage_dir" -czf "dist/${asset_name}" context-pack README.md LICENSE

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${asset_name}" > "dist/${asset_name}.sha256"
          else
            shasum -a 256 "dist/${asset_name}" > "dist/${asset_name}.sha256"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release bundle
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          find dist -type f -name "*.sha256" -print0 | sort -z | xargs -0 cat > dist/SHA256SUMS
          bash scripts/render-homebrew-formula.sh "${GITHUB_REPOSITORY}" "${version}" "dist" "dist/context-pack.rb"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/SHA256SUMS
            dist/context-pack.rb
          fail_on_unmatched_files: true

  publish-homebrew-tap:
    name: Publish Homebrew formula
    needs: publish
    runs-on: ubuntu-24.04
    if: ${{ vars.HOMEBREW_TAP_REPOSITORY != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          bash scripts/render-homebrew-formula.sh "${GITHUB_REPOSITORY}" "${version}" "dist" "dist/context-pack.rb"

      - name: Publish formula to tap repository
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured" >&2
            exit 1
          fi

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" tap
          mkdir -p tap/Formula
          cp dist/context-pack.rb tap/Formula/context-pack.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --short -- Formula/context-pack.rb)" ]; then
            echo "Formula already up to date"
            exit 0
          fi

          git add Formula/context-pack.rb
          git commit -m "Update context-pack to ${GITHUB_REF_NAME#v}"
          git push
